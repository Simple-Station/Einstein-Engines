# НЕГАТИВНЫЕ УСЛОВИЯ

- type: clause
  id: glassshard
  clauseWeight: 90
  addedComponents:
  - type: MobThresholds
    thresholds:
      0: Alive
      2: Critical
      4: Dead

- type: clause
  id: flammable
  clauseWeight: 20
  addedComponents:
  - type: Flammable
    firestackFade: -0.05
    damage:
      types:
        Heat: 40

- type: clause
  id: cancer
  clauseWeight: 60
  addedComponents:
  - type: PassiveDamage
    allowedStates:
      - Alive
      - Critical
    damageCap: 9999
    damage:
      types:
        Cellular: 0.3 # игрок умрет от рака через 11 минут

- type: clause
  id: plasmaboy
  clauseWeight: 45
  addedComponents:
  - type: PyroclasticAnomaly
  - type: TempAffectingAnomaly
    tempChangePerSecond: 25
    hotspotExposeTemperature: 1000
  - type: GasProducerAnomaly
    releasedGas: 3
    releasePassively: true
    spawnRadius: 0

- type: clause
  id: lightscary
  clauseWeight: 40
  addedComponents:
  - type: LightDetection

