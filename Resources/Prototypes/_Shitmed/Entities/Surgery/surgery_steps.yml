- type: entity
  abstract: true
  id: SurgeryStepBase
  components:
  - type: SurgeryStep

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepOpenIncisionScalpel
  name: Cut with a scalpel
  components:
  - type: SurgeryStep
    tool:
    - type: Scalpel
    add:
    - type: IncisionOpen
    duration: 2
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryDamageChangeEffect
    damage:
      types:
        Bloodloss: 10
    sleepModifier: 0.5
  - type: SurgeryStepPainInflicter
    painDuration: 30
    painType: TraumaticPain
    amount: 34
    sleepModifier: 0.12

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepClampBleeders
  name: Clamp the bleeders
  components:
  - type: SurgeryStep
    tool:
    - type: Hemostat
    add:
    - type: BleedersClamped
    duration: 4
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: SurgeryRepeatableStep
  - type: SurgeryBleedsTreatmentStep
    amount: 2

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepCloseBloodOutputs
  name: Stitch up destroyed tissues
  components:
  - type: SurgeryStep
    tool:
    - type: Stitches
    remove:
    - type: BleedersClamped
    duration: 5
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/stitches.rsi
    state: stitches
  - type: SurgeryStepPainInflicter
    painDuration: 30
    painType: TraumaticPain
    amount: 34
    sleepModifier: 0.12

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRetractSkin
  name: Retract the skin
  components:
  - type: SurgeryStep
    tool:
    - type: Retractor
    add:
    - type: SkinRetracted
    duration: 2
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/retractor.rsi
    state: retractor

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRemoveSeveredSkin
  name: Remove the dead skin
  components:
  - type: SurgeryStep
    tool:
    - type: Scalpel
    add:
    - type: BodyPartSawed
    duration: 4
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: SurgeryStepPainInflicter
    painDuration: 60
    amount: 45
    sleepModifier: 0.07

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepSawBones
  name: Saw through bones
  components:
  - type: SurgeryStep
    tool:
    - type: BoneSaw
    add:
    - type: BonesSawed
    duration: 4
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/circular-saw.rsi
    state: circular-saw
  - type: SurgeryStepPainInflicter
    painType: TraumaticPain
    painDuration: 40
    amount: 34
    sleepModifier: 0

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepRemoveLeftoverBones
  name: Clear up bone leftovers
  components:
  - type: SurgeryStep
    tool:
    - type: BoneSaw
    add:
    - type: BonesOpen
    duration: 5
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/circular-saw.rsi
    state: circular-saw

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepMendBones
  name: Mend bones
  components:
  - type: SurgeryStep
    tool:
    - type: BoneGel
    duration: 7
  - type: SurgeryAffixPartStep
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/bone-gel.rsi
    state: bone-gel
  - type: SurgeryStepPainInflicter
    amount: 12
    painType: TraumaticPain
    sleepModifier: 0
  - type: SurgeryRepeatableStep
  - type: SurgeryTraumaTreatmentStep
    traumaType: BoneDamage
    amount: 17

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepHealOrgans
  name: Heal Organs
  components:
  - type: SurgeryStep
    tool:
    - type: Tending
    duration: 7
  - type: SurgeryAffixOrganStep
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: SurgeryStepPainInflicter
    amount: 24
    painType: TraumaticPain
    sleepModifier: 0
  - type: SurgeryRepeatableStep
  - type: SurgeryTraumaTreatmentStep
    traumaType: OrganDamage
    amount: 17

- type: entity
  parent: SurgeryStepBase
  id: SurgeryStepPriseOpenBones
  name: Prise the bones open
  components:
  - type: SurgeryStep
    tool:
    - type: Retractor
    add:
    - type: BonesOpen
    duration: 2
  - type: Sprite
    sprite: _Shitmed/Objects/Specific/Medical/Surgery/retractor.rsi
    state: retractor

