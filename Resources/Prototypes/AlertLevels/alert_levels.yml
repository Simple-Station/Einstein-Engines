- type: alertLevels
  id: stationAlerts
  defaultLevel: green
  levels:
    green:
      announcement: alert-level-green-announcement
      color: Green
      sound: /Audio/Announcements/Alerts/code_green.ogg
      emergencyLightColor: LawnGreen
      shuttleTime: 600
    blue:
      announcement: alert-level-blue-announcement
      sound: /Audio/Announcements/Alerts/code_blue.ogg
      color: DodgerBlue
      forceEnableEmergencyLights: true
      emergencyLightColor: DodgerBlue
      shuttleTime: 600
    violet:
      announcement: alert-level-violet-announcement
      sound: /Audio/Announcements/Alerts/code_violet.ogg
      color: Violet
      emergencyLightColor: Violet
      forceEnableEmergencyLights: true
      shuttleTime: 600
    yellow:
      announcement: alert-level-yellow-announcement
      sound: /Audio/Announcements/Alerts/code_yellow.ogg
      color: Yellow
      emergencyLightColor: Goldenrod
      forceEnableEmergencyLights: true
      shuttleTime: 600
    red:
      announcement: alert-level-red-announcement
      sound: /Audio/Announcements/Alerts/code_red.ogg
      color: Red
      emergencyLightColor: Red
      forceEnableEmergencyLights: true
      shuttleTime: 600 #No reduction in time as we don't have swiping for red alert like in /tg/. Shuttle times are intended to create friction, so having a way to brainlessly bypass that would be dumb.
    gamma:
      announcement: alert-level-gamma-announcement
      selectable: false
      sound:
        path: /Audio/Announcements/Alerts/code_gamma.ogg
        params:
          volume: -2
      disableSelection: true
      color: PaleVioletRed
      emergencyLightColor: PaleVioletRed
      forceEnableEmergencyLights: true
    delta:
      announcement: alert-level-delta-announcement
      selectable: false
      sound:
        path: /Audio/Announcements/Alerts/code_delta.ogg
        params:
          volume: -3
      disableSelection: true
      color: DarkRed
      emergencyLightColor: Orange
      forceEnableEmergencyLights: true
      shuttleTime: 1200
    epsilon:
      announcement: alert-level-epsilon-announcement
      selectable: false
      sound:
        path: /Audio/Announcements/Alerts/code_epsilon.ogg
        params:
          volume: -2
      disableSelection: true
      color: DarkViolet
      emergencyLightColor: DarkViolet
      forceEnableEmergencyLights: true
      shuttleTime: 1200
    omicron: # Goobstation
      announcement: alert-level-omicron-announcement
      selectable: false
      sound:
        path: /Audio/Announcements/Alerts/code_omicron.ogg
      disableSelection: true
      color: Ivory
      emergencyLightColor: Ivory
      forceEnableEmergencyLights: true
      shuttleTime: 2400
    octarine: # DeltaV - Cosmic Cult
      announcement: alert-level-octarine-announcement
      selectable: false
      sound: /Audio/Announcements/Alerts/code_octarine.ogg
      disableSelection: true
      color: CadetBlue
      emergencyLightColor: CadetBlue
      forceEnableEmergencyLights: true
      shuttleTime: 600
    honk: # Goobstation
      announcement: alert-level-honk-announcement
      selectable: false
      emagSelectable: true
      sound:
        path: /Audio/Items/bikehorn.ogg
      color: Magenta
      emergencyLightColor: Magenta
      forceEnableEmergencyLights: true
      shuttleTime: 600
    enigma:
      announcement: alert-level-enigma-announcement
      selectable: false
      sound: /Audio/Announcements/Alerts/code_enigma.ogg # DS14 alert sound
      disableSelection: true
      color: "#EF7200"
      emergencyLightColor: "#EF7200"
      forceEnableEmergencyLights: true
      shuttleTime: 240
