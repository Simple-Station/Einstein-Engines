- type: entity
  parent: BaseGameRule
  id: Heretic
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - HereticKnowledgeObjective
    - HereticSacrificeObjective
    - HereticSacrificeHeadObjective
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 3
      playerRatio: 15
      chaosScore: 250
      lateJoinAdditional: true
      jobBlacklist: [ Chaplain, ] # GOOBSTATION
      blacklist:
        components:
        - CommandStaff
      mindRoles:
      - MindRoleHeretic
      components:
      - type: WeakToHoly
      - type: CanEnchant
  - type: Tag
    tags:
      - RoundstartAntag

- type: entity
  parent: BaseGameRule
  id: CalmHeretic
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - HereticKnowledgeObjective
    - HereticSacrificeObjective
    - HereticSacrificeHeadObjective
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: heretic-roundend-name
    definitions:
    - prefRoles: [ Heretic ]
      max: 2
      playerRatio: 20
      lateJoinAdditional: true
      jobBlacklist: [ Chaplain ] # GOOBSTATION
      blacklist:
        components:
        - CommandStaff
      mindRoles:
      - MindRoleHeretic
      components:
      - type: WeakToHoly
      - type: CanEnchant
  - type: Tag
    tags:
      - CalmAntag
