- type: entity
  parent: ClothingNeckBase
  id: SurveillanceWirelessCameraBodySecurity
  name: security bodycam
  description: A body mounted camera. It's watching you.
  components:
  - type: DeviceNetwork
    deviceNetId: Wired # :clueless:
    receiveFrequencyId: SurveillanceCameraSecurity
    transmitFrequencyId: SurveillanceCamera
  - type: SurveillanceCamera
    networkSet: true
    nameSet: True
    mobile: True  # Goobstation - mobile cameras fix
    id: Bodycam
  - type: Eye
  - type: WirelessNetworkConnection
    range: 200
  - type: SurveillanceCameraMicrophone
    blacklist:
      components:
      - SurveillanceCamera
      - SurveillanceCameraMonitor
      - RadioSpeaker
  - type: ActiveListener
    range: 10
  - type: ClothingGrantComponent
    component:
    - type: StationAiVision
      range: 4
  - type: Sprite
    sprite: _Goobstation/Clothing/Neck/Misc/nopro.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Neck/Misc/nopro.rsi
    quickEquip: true

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckFellForItAward
  name: nanotrasen gullibility award
  description: An award given out by nanotrasen to mark extreme cases of gullibility
  components:
  - type: Sprite
    sprite: _Goobstation/Clothing/Neck/Misc/fellforitaward.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Neck/Misc/fellforitaward.rsi