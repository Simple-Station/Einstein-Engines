- type: entity
  name: sharkminnow
  id: MobSharkDragon
  suffix: DragonBrood
  parent: MobShark
  components:
    - type: GhostRole
      allowMovement: true
      allowSpeech: true
      makeSentient: true
      name: ghost-role-information-sentient-shark-name
      description: ghost-role-information-sentient-carp-description
      rules: ghost-role-information-space-dragon-summoned-carp-rules
      mindRoles:
      - MindRoleGhostRoleTeamAntagonist
      raffle:
        settings: short
    - type: GhostTakeoverAvailable
    - type: HTN
      rootTask:
        task: DragonCarpCompound
    - type: Tag
      tags:
        - Carp
        - DoorBumpOpener
    - type: CollectiveMind
      defaultChannel: Dragonmind
      channels:
      - Dragonmind

# carp but with dragon compound to make it follow the carp caller
- type: entity
  id: MobCarpCaller
  categories: [ HideSpawnMenu ] # no reason to spawn it
  parent: MobCarp
  components:
    - type: HTN
      rootTask:
        task: DragonCarpCompound
