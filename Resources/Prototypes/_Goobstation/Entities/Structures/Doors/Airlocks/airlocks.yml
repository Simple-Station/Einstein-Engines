- type: entity # Goobstation - Sweet jani door recolour
  parent: Airlock
  id: AirlockJanitor
  suffix: Janitor
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Standard/janitor.rsi
  - type: PaintableAirlock
    group: Standard
    department: Civilian
  - type: Wires
    layoutId: AirlockService

- type: entity
  parent: AirlockGlass
  id: AirlockJanitorGlass
  suffix: Janitor
  components:
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Glass/janitor.rsi
  - type: PaintableAirlock
    group: Glass
    department: Civilian
  - type: Wires
    layoutId: AirlockService

- type: entity # Goobedit - High Sec Door for SM Containment
  parent: HighSecDoor
  id: HighSecAtmosLocked
  suffix: Atmospherics, Locked
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsAtmospherics ]
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Glass/atmossealed.rsi
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - GlassLayer
  - type: RadiationBlocker
    resistance: 20
  - type: Door
    occludes: false
  - type: Occluder
    enabled: false

- type: entity
  parent: AirlockGlass
  id: AirlockRobotics
  suffix: Robotics
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsRobotics ]
  - type: Sprite
    sprite: _Goobstation/Structures/Doors/Airlocks/Glass/robotics.rsi
  - type: PaintableAirlock
    department: Science
    group: Glass
  - type: Wires
    layoutId: AirlockScience
