- type: entity
  name: vial of blood
  id: BottleOfBlood
  parent: [BaseItem, BaseMagicalContraband]
  description: A magically infused bottle of blood, distilled from countless murder victims. Used in unholy rituals to attract horrifying creatures.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/vials.rsi
    state: vial
  - type: SolutionContainerManager
    solutions:
      liquid:
        maxVol: 15
        reagents:
        - ReagentId: Blood
          Quantity: 15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -4
      - !type:SpillBehavior
        solution: liquid
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 0
            max: 1
      - !type:AddGameRuleBehavior
        rule: SlaughterDemonSummon
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: VialSummon
