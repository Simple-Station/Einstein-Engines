# Slasher
- type: entity
  parent: BaseGameRule
  id: SlasherSpawn
  components:
  - type: StationEvent
    weight: 3
    duration: null
    earliestStart: 30
    minimumPlayers: 30
    chaos:
      Hostile: 40
      Combat: 40
      Death: 40
    eventType: HostilesSpawn
  - type: GameRule
    chaosScore: 600
  - type: AntagRandomSpawn
  - type: AntagLoadProfileRule
    speciesOverride: Human
    speciesOverrideBlacklist:
    - Yowie
    - IPC
    - Diona
    - Harpy
    - Plasmaman
  - type: AntagObjectives
    objectives:
    - SlasherSurviveObjective
    - SlasherAbsorbSoulsObjective
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: slasher-round-end-agent-name
    definitions:
    - spawnerPrototype: SpawnPointGhostSlasher
      min: 1
      max: 1
      pickPlayer: false
      startingGear: SlasherGear
      briefing:
        text: slasher-role-greeting
        color: Red
        sound: /Audio/_Goobstation/Effects/Slasher/SlasherIntro.ogg
      mindRoles:
      - MindRoleSlasher
      components:
      - type: Slasher
      - type: SlasherSummonMachete
      - type: SlasherStaggerArea
      - type: SlasherRegenerate
      - type: SlasherPossession
      - type: SlasherBloodTrail
      - type: SlasherIncorporeal
      - type: SlasherSoulSteal
      - type: SlasherSummonMeatSpike
      - type: BreathingImmunity
      - type: GunBlocked
        PopupText: slasher-cannot-use-guns # Seems to be broken inside AntagSelection
      - type: WeakToHoly
      - type: NightVision
        activateSound: null
        deactivateSound: null
      - type: Hunger
        baseDecayRate: 0
      - type: Thirst
        baseDecayRate: 0
      - type: MobThresholds
        thresholds:
          0: Alive
          150: Dead
      - type: RandomMetadata
        nameSegments:
        - NamesSlasherTitle
        - NamesSlasher
        nameFormat: name-format-slasher
  - type: Tag
    tags:
    - MidroundAntag

#Contractor
- type: entity
  parent: ContractorSpawn
  id: ContractorSpawnMidround
  components:
  - type: GameRule
    chaosScore: 400
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Goobstation/Shuttles/ShuttleEvent/Legionnaire.yml
  - type: StationEvent
    startAnnouncement: null
    weight: 1
    duration: null
    earliestStart: 30
    minimumPlayers: 30
    chaos:
      Hostile: 40
      Combat: 40
      Death: 40
    eventType: HostilesSpawn
  - type: AntagLoadProfileRule
    speciesOverrideBlacklist:
    - Yowie
    - IPC
    - Diona
    - Harpy
    - Plasmaman
  - type: AntagObjectives
    objectives:
    - ContractorRansomObjective
  - type: AntagSelection
    selectionTime: PostPlayerSpawn
    agentName: ghost-role-information-contractor-name
    definitions:
    - spawnerPrototype: ContractorSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: ContractorGear
      roleLoadout:
      - RoleSurvivalNukie
      mindRoles:
      - MindRoleContractor
      briefing:
        text: contractor-role-greeting
        color: Red
        sound: /Audio/Ambience/Antag/traitor_wawa.ogg
      components:
      - type: RandomMetadata
        nameSegments:
        - NamesContractorPrefix
        - NamesSyndicateElite
        nameFormat: name-format-standard
      - type: NpcFactionMember
        factions:
        - Syndicate
  - type: Tag
    tags:
    - MidroundAntag
