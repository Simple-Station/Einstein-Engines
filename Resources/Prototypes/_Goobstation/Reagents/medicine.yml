    - !type:PlantAdjustHealth
      amount: 8
  worksOnTheDead: true
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaleByQuantity: true
        ignoreResistances: false # theoretically allows for degenerate behaviour, in practice should be unlikely; also low healing amount
        ignoreBlockers: false
        damage:
          types:
            Blunt: 0.25
            Poison: -2
            Radiation: -1
        conditions:
        - !type:HasComponentOnEquipmentCondition
          components:
          - type: PressureProtection # can't get through this to reach the bodyparts!
          invert: true
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          groups:
            Toxin: -2
      - !type:HealthChange
        damage:
          types:
            Blunt: 2

