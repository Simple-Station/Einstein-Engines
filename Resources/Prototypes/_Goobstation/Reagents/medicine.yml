- type: reagent
  id: Stasizium
  name: reagent-name-stasizium
  group: Medicine
  desc: reagent-desc-stasizium
  physicalDesc: reagent-physical-desc-stasizium
  flavor: futuristic
  color: "#8364BE"
  worksOnTheDead: true
  metabolisms:
    Medicine:
      effects:
        - !type:ModifyBloodLevel
          amount: 10
        - !type:ModifyBleedAmount
          amount: -2
        - !type:ReduceRotting
          seconds: 30
          conditions:
          - !type:MobStateCondition
            mobstate: Dead
        - !type:HealthChange
          damage:
            groups:
              Brute: -20
              Burn: -20
              Airloss: -20
              Toxin: -20
              Genetic: -20
        - !type:HealthChange
          conditions:
          - !type:ReagentThreshold
            min: 21
          damage:
            types:
              Blunt: 100
        - !type:AdjustTemperature
          conditions:
          - !type:Temperature
            min: 263.15
          amount: -50000

# Normal, but little gimmicky meds

- type: reagent
  id: Probital
  name: reagent-name-probital
  group: Medicine
  desc: reagent-desc-probital
  physicalDesc: reagent-physical-desc-soothing
  flavor: medicine
  color: "#ffff64"
  metabolisms:
    Medicine:
      effects:
      - !type:HealthChange
        damage:
          groups:
            Brute: -1.5 # Lower than Bicardine, offloading healing onto mitotrophin
      - !type:TakeStaminaDamage
        conditions:
        - !type:ReagentThreshold
          min: 20
        - !type:OrganType
          type: Yowie
          shouldHave: false
        amount: 5 # effectively 3 "sleeps" per 20OD, but only 1 on 10 (like with 2 syringes)
        immediate: false
      - !type:MovespeedModifier # kinda sleepiness
        conditions:
        - !type:StaminaDamageThreshold
          min: 80
        - !type:ReagentThreshold
          min: 20
        - !type:OrganType
          type: Yowie
          shouldHave: false
        walkSpeedModifier: 0.8
        sprintSpeedModifier: 0.8
      - !type:GenericStatusEffect
        conditions:
        - !type:StaminaDamageThreshold
          min: 80
        - !type:ReagentThreshold
          min: 20
        key: Stutter
        component: StutteringAccent
      - !type:GenericStatusEffect # go to sleep once cycle elapses
        conditions:
        - !type:StaminaDamageThreshold
          min: 100
        - !type:ReagentThreshold
          min: 20
        - !type:OrganType
          type: Yowie
          shouldHave: false
        key: ForcedSleep
        component: ForcedSleeping
        refresh: false
        type: Add
        time: 10
      - !type:TakeStaminaDamage
        conditions:
        - !type:StaminaDamageThreshold
          min: 100
        - !type:ReagentThreshold
          min: 20
        - !type:OrganType
          type: Yowie
          shouldHave: false
        amount: -100 # power nap
        immediate: true
      - !type:AdjustReagent
        reagent: Mitogen
        amount: 0.125 # 1.25 per 5u

