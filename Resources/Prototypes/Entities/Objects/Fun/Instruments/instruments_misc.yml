- type: entity
  parent: BaseHandheldInstrument
  id: BikeHornInstrument
  name: gilded bike horn
  description: An exquisitely decorated bike horn, capable of honking in a variety of notes.
  components:
  - type: Instrument
    program: 1
    bank: 1
  - type: Sprite
    sprite: Objects/Fun/Instruments/bike_horn.rsi
  - type: Tag
    tags:
    - BrassInstrument #Go figure.
  - type: Item
    size: Small
    storedRotation: -90
  - type: Clothing
    slots: [Belt]
    quickEquip: false

- type: entity
  parent: PhoneInstrument
  id: BananaPhoneInstrument
  name: banana phone
  description: A direct line to the Honkmother. Seems to always go to voicemail.
  components:
  - type: Sprite
    state: banana_phone
  - type: EmitSoundOnLand
    sound:
       path: /Audio/Items/bikehorn.ogg
  - type: Slippery
  - type: StepTrigger
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        hard: false
        layer:
        - SlipLayer
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 5
        mask:
        - ItemMask
  - type: Prayable
    sentMessage: prayer-popup-notify-honkmother-sent
    notificationPrefix: prayer-chat-notify-honkmother
    verb: prayer-verbs-call
    verbImage: null
    notificationSound: # Goobstation - Admin Notifications
      path: /Audio/_Goobstation/Misc/phone_ring.ogg
