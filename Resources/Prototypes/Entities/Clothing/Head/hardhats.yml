  - type: Sprite
    sprite: Clothing/Head/Hardhats/armored.rsi
  - type: Clothing
    sprite: Clothing/Head/Hardhats/armored.rsi
  - type: Armor #Copied from the sec helmet, as it's hard to give these sane values without locational damage existing.
    coverage:
    - Head
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
